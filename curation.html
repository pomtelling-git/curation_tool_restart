<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Visual Curator – Project</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app">
      <header class="app-header">
        <button
          type="button"
          id="backToProjects"
          class="back-button"
          aria-label="Back to pages"
        >
          ←
        </button>
        <div class="project-name">
          <span class="project-label">Project</span>
          <span
            class="gallery-title"
            id="projectName"
            contenteditable="true"
            spellcheck="false"
          >
            Untitled project
          </span>
        </div>
        <p class="gallery-meta">
          <span id="itemCount">0 items</span>
        </p>
      </header>

      <main class="app-main">
        <section class="drop-zone" id="dropZone">
          <div class="drop-zone-inner">
            <p class="drop-title" id="dropTitle">Drag files here</p>
            <input
              id="fileInput"
              class="visually-hidden"
              type="file"
              accept="image/*,video/*"
              multiple
            />
          </div>
        </section>

        <section class="gallery-section">
          <div class="gallery" id="gallery"></div>
        </section>
      </main>
    </div>

    <script src="./curation.js"></script>
  </body>
  </html>
